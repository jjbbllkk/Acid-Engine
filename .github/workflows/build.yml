name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  RACK_SDK_VERSION: 2.6.6

jobs:
  build-mac:
    name: Build (${{ matrix.target }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mac-arm64
            cross_compile: ""
          - target: mac-x64
            cross_compile: "x86_64-apple-darwin"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: brew install jq

      - name: Download Rack SDK
        run: |
          curl -fsSL -o Rack-SDK.zip "https://vcvrack.com/downloads/Rack-SDK-${RACK_SDK_VERSION}-${{ matrix.target }}.zip"
          unzip -q Rack-SDK.zip
          ls Rack-SDK

      - name: Build
        env:
          CROSS_COMPILE: ${{ matrix.cross_compile }}
        run: |
          export RACK_DIR="$PWD/Rack-SDK"
          make dist -j$(sysctl -n hw.ncpu)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*.vcvplugin
          if-no-files-found: error

  build-lin:
    name: Build (lin-x64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libglu-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl-dev \
            libjack-jackd2-dev \
            pkg-config \
            jq \
            unzip \
            zip

      - name: Download Rack SDK
        run: |
          curl -fsSL -o Rack-SDK.zip "https://vcvrack.com/downloads/Rack-SDK-${RACK_SDK_VERSION}-lin-x64.zip"
          unzip -q Rack-SDK.zip

      - name: Build
        run: |
          export RACK_DIR="$PWD/Rack-SDK"
          make dist -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lin-x64
          path: dist/*.vcvplugin
          if-no-files-found: error

  build-win:
    name: Build (win-x64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            unzip
            zip
            jq
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config

      - name: Download Rack SDK
        run: |
          curl -fsSL -o Rack-SDK.zip "https://vcvrack.com/downloads/Rack-SDK-${RACK_SDK_VERSION}-win-x64.zip"
          unzip -q Rack-SDK.zip

      - name: Build
        run: |
          export RACK_DIR="$PWD/Rack-SDK"
          make dist -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-x64
          path: dist/*.vcvplugin
          if-no-files-found: error

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-mac, build-lin, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -name '*.vcvplugin'

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.vcvplugin
          generate_release_notes: true
          fail_on_unmatched_files: true
